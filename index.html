<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="travel.manager">
<title>travel.manager - 旅の記録</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f0e6;--bg-card:#fffaf2;--ink:#1c1812;--ink-soft:#5a4f42;--ink-mute:#9a8d7d;--accent:#8b1a1a;--gold:#c9a25e;--line:#e3d8c5;--line-soft:#efe6d4;--past:#6b6157;--past-bg:#ebe4d4;--success:#4a7c4e;--shadow:0 2px 12px rgba(60,40,20,.08);--shadow-lg:0 8px 32px rgba(60,40,20,.12);--radius:14px;--serif:'Shippori Mincho',serif;--sans:'Zen Kaku Gothic New',sans-serif}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;overscroll-behavior-y:none}
body{background-image:radial-gradient(circle at 20% 10%,rgba(201,162,94,.06) 0%,transparent 40%),radial-gradient(circle at 80% 90%,rgba(139,26,26,.04) 0%,transparent 50%);min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}
.app{max-width:720px;margin:0 auto;padding:0 16px}
header{padding:calc(env(safe-area-inset-top) + 16px) 0 12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.brand{font-family:var(--serif);font-weight:800;font-size:22px;letter-spacing:.02em;color:var(--ink);display:flex;align-items:baseline;gap:6px}
.brand .dot{color:var(--accent)}
.brand .sub{font-family:var(--sans);font-size:11px;font-weight:500;color:var(--ink-mute);margin-left:4px;letter-spacing:.1em}
.header-actions{display:flex;gap:6px;align-items:center}
.icon-btn{background:var(--bg-card);border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-size:12px;font-family:var(--sans);font-weight:500;color:var(--ink-soft);cursor:pointer;display:flex;align-items:center;gap:5px;box-shadow:var(--shadow);position:relative;transition:transform .15s ease}
.icon-btn:active{transform:scale(.96)}
.icon-btn .badge{background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:999px;min-width:18px;text-align:center}
.sync-indicator{width:8px;height:8px;border-radius:50%;background:var(--ink-mute);display:inline-block}
.sync-indicator.active{background:var(--success)}
.sync-indicator.syncing{background:var(--gold);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.4}}
.tabs{display:flex;gap:4px;background:var(--bg-card);padding:4px;border-radius:12px;border:1px solid var(--line);margin-bottom:16px;box-shadow:var(--shadow)}
.tab{flex:1;padding:10px 8px;background:transparent;border:none;border-radius:9px;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--ink-mute);cursor:pointer;transition:all .2s ease}
.tab.active{background:var(--ink);color:var(--bg);font-weight:700}
.trip-card{background:var(--bg-card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s ease;position:relative;overflow:hidden}
.trip-card:active{transform:scale(.99)}
.trip-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--accent),var(--gold))}
.trip-card.past::before{background:linear-gradient(180deg,var(--past),var(--ink-mute))}
.trip-title{font-family:var(--serif);font-weight:600;font-size:18px;color:var(--ink);margin:0 0 6px}
.trip-meta{display:flex;flex-wrap:wrap;gap:8px 14px;font-size:12px;color:var(--ink-soft)}
.trip-meta .item{display:inline-flex;align-items:center;gap:4px}
.trip-badges{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.badge-pill{font-size:11px;font-weight:500;padding:3px 9px;border-radius:999px;background:var(--line-soft);color:var(--ink-soft);display:inline-flex;align-items:center;gap:4px}
.empty{text-align:center;padding:60px 20px;color:var(--ink-mute)}
.empty .icon{font-size:48px;margin-bottom:12px;opacity:.6}
.empty .title{font-family:var(--serif);font-size:18px;color:var(--ink-soft);margin-bottom:6px}
.empty .desc{font-size:13px}
.fab{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 24px);right:max(24px,calc(50vw - 360px + 24px));width:56px;height:56px;border-radius:50%;background:var(--ink);color:var(--bg);border:none;font-size:26px;box-shadow:var(--shadow-lg);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50;transition:transform .15s ease}
.fab:active{transform:scale(.92)}
.modal-overlay{position:fixed;inset:0;background:rgba(28,24,18,.55);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s ease}
.modal-overlay.active{opacity:1;pointer-events:auto}
.modal{background:var(--bg);width:100%;max-width:720px;max-height:90vh;border-radius:20px 20px 0 0;overflow-y:auto;transform:translateY(100%);transition:transform .25s cubic-bezier(.2,.9,.3,1);padding-bottom:env(safe-area-inset-bottom)}
.modal-overlay.active .modal{transform:translateY(0)}
.modal-header{position:sticky;top:0;background:var(--bg);padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;z-index:1}
.modal-title{font-family:var(--serif);font-weight:600;font-size:17px;color:var(--ink)}
.modal-close{background:transparent;border:none;font-size:22px;color:var(--ink-soft);cursor:pointer;padding:4px 8px}
.modal-body{padding:18px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:500;color:var(--ink-soft);margin-bottom:5px;letter-spacing:.02em}
.field input,.field select,.field textarea{width:100%;padding:11px 13px;background:var(--bg-card);border:1px solid var(--line);border-radius:10px;font-family:var(--sans);font-size:15px;color:var(--ink);-webkit-appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);background:#fff}
.field textarea{min-height:70px;resize:vertical}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{width:100%;padding:13px;border-radius:10px;border:none;font-family:var(--sans);font-size:15px;font-weight:600;cursor:pointer;transition:transform .15s ease}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--ink);color:var(--bg)}
.btn-secondary{background:var(--bg-card);color:var(--ink);border:1px solid var(--line)}
.btn-danger{background:var(--accent);color:#fff}
.btn-row{display:flex;gap:8px;margin-top:10px}
.booking-item{background:var(--bg-card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;cursor:pointer}
.booking-icon{font-size:22px;flex-shrink:0}
.booking-content{flex:1;min-width:0}
.booking-title{font-weight:600;font-size:15px;color:var(--ink);margin-bottom:3px}
.booking-meta{font-size:12px;color:var(--ink-soft);line-height:1.5}
.booking-site{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;background:var(--ink);color:var(--bg);letter-spacing:.05em;display:inline-block;margin-top:4px}
.past-header{background:var(--past-bg);border-radius:12px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.past-header .label{font-family:var(--serif);font-size:14px;color:var(--past)}
.past-header .count{font-family:var(--serif);font-size:22px;font-weight:800;color:var(--ink)}
.section-title{font-family:var(--serif);font-size:13px;font-weight:600;color:var(--ink-soft);letter-spacing:.08em;margin:16px 0 10px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--line)}
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 90px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bg);padding:10px 18px;border-radius:999px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .2s ease,transform .2s ease;z-index:200;box-shadow:var(--shadow-lg);max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.sync-status{padding:10px 12px;background:var(--line-soft);border-radius:8px;font-size:12px;color:var(--ink-soft);margin-bottom:12px}
.sync-status.connected{background:rgba(74,124,78,.1);color:var(--success)}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">travel<span class="dot">.</span>manager<span class="sub">旅の記録</span></div>
    <div class="header-actions">
      <button class="icon-btn" id="syncBtn"><span class="sync-indicator" id="syncIndicator"></span>☁️</button>
      <button class="icon-btn" id="pastBtn">📚 過去<span class="badge" id="pastCount" style="display:none">0</span></button>
    </div>
  </header>
  <div class="tabs" id="mainTabs">
    <button class="tab active" data-tab="trips">🧳 旅行</button>
    <button class="tab" data-tab="bookings">📋 予約</button>
    <button class="tab" data-tab="timeline">🗓 時系列</button>
  </div>
  <div id="content"></div>
</div>
<button class="fab" id="addFab">＋</button>

<div class="modal-overlay" id="tripModal"><div class="modal">
  <div class="modal-header"><div class="modal-title" id="tripModalTitle">新しい旅行</div><button class="modal-close" data-close>×</button></div>
  <div class="modal-body"><form id="tripForm">
    <input type="hidden" id="tripId">
    <div class="field"><label>旅行名</label><input type="text" id="tripName" required placeholder="例: 京都の桜旅"></div>
    <div class="field"><label>行き先</label><input type="text" id="tripDest" placeholder="例: 京都"></div>
    <div class="field-row">
      <div class="field"><label>出発日</label><input type="date" id="tripStart" required></div>
      <div class="field"><label>帰着日</label><input type="date" id="tripEnd" required></div>
    </div>
    <div class="field"><label>メモ</label><textarea id="tripNotes"></textarea></div>
    <button type="submit" class="btn btn-primary">保存</button>
    <div class="btn-row" id="tripEditActions" style="display:none"><button type="button" class="btn btn-danger" id="tripDeleteBtn">削除</button></div>
  </form></div>
</div></div>

<div class="modal-overlay" id="detailModal"><div class="modal">
  <div class="modal-header"><div class="modal-title" id="detailTitle">旅行の詳細</div><button class="modal-close" data-close>×</button></div>
  <div class="modal-body" id="detailBody"></div>
</div></div>

<div class="modal-overlay" id="bookingModal"><div class="modal">
  <div class="modal-header"><div class="modal-title" id="bookingModalTitle">予約を追加</div><button class="modal-close" data-close>×</button></div>
  <div class="modal-body"><form id="bookingForm">
    <input type="hidden" id="bookingId"><input type="hidden" id="bookingTripId">
    <div class="field"><label>種類</label><select id="bookingType">
      <option value="hotel">🏨 ホテル</option><option value="flight">✈️ 飛行機</option>
      <option value="train">🚄 電車</option><option value="car">🚗 レンタカー</option>
      <option value="other">📌 その他</option>
    </select></div>
    <div class="field"><label>名称</label><input type="text" id="bookingName" required></div>
    <div class="field"><label>予約サイト</label><select id="bookingSite">
      <option>一休</option><option>じゃらん</option><option>JTB</option><option>楽天トラベル</option>
      <option>Booking.com</option><option>Agoda</option><option>Expedia</option><option>公式サイト</option><option>その他</option>
    </select></div>
    <div class="field-row">
      <div class="field"><label>開始日</label><input type="date" id="bookingStart" required></div>
      <div class="field"><label>終了日</label><input type="date" id="bookingEnd"></div>
    </div>
    <div class="field"><label>予約番号</label><input type="text" id="bookingConfirm"></div>
    <div class="field"><label>金額</label><input type="text" id="bookingPrice" inputmode="numeric"></div>
    <div class="field"><label>メモ</label><textarea id="bookingNotes"></textarea></div>
    <button type="submit" class="btn btn-primary">保存</button>
    <div class="btn-row" id="bookingEditActions" style="display:none"><button type="button" class="btn btn-danger" id="bookingDeleteBtn">削除</button></div>
  </form></div>
</div></div>

<div class="modal-overlay" id="syncModal"><div class="modal">
  <div class="modal-header"><div class="modal-title">☁️ クラウド同期</div><button class="modal-close" data-close>×</button></div>
  <div class="modal-body">
    <div class="sync-status" id="syncStatusBox">未接続です</div>
    <div class="field"><label>Google Apps Script URL</label><input type="text" id="syncUrl" placeholder="https://script.google.com/macros/s/.../exec"></div>
    <button class="btn btn-secondary" id="testSyncBtn" style="margin-bottom:8px">🔌 接続テスト</button>
    <button class="btn btn-primary" id="saveSyncBtn">保存して同期開始</button>
    <div class="btn-row">
      <button class="btn btn-secondary" id="syncNowBtn">⟳ 今すぐ同期</button>
      <button class="btn btn-danger" id="disconnectSyncBtn">連携を解除</button>
    </div>
    <details style="margin-top:16px;font-size:12px;color:var(--ink-soft)">
      <summary style="cursor:pointer;padding:8px 0">📘 設定方法を見る</summary>
      <div style="padding:8px 0;line-height:1.7">
        1. Google スプレッドシートを新規作成<br>
        2. 拡張機能 → Apps Script<br>
        3. 同梱の GAS コードを貼り付け<br>
        4. デプロイ → 新しいデプロイ → ウェブアプリ<br>
        5. 「全員」アクセス可で公開<br>
        6. 表示された URL をここに貼り付け
      </div>
    </details>
  </div>
</div></div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY='travel-manager-data-v3';
const SYNC_URL_KEY='travel-manager-sync-url';
const SYNC_TIME_KEY='travel-manager-sync-time';
let state={trips:[],bookings:[],meta:{updatedAt:0}};
let currentTab='trips',viewingPast=false,currentDetailTripId=null,syncing=false;

function migrateOldData(){
  if(localStorage.getItem(STORAGE_KEY))return false;
  let migratedTrips=[],migratedBookings=[],foundKey=null;
  for(let i=0;i<localStorage.length;i++){
    const key=localStorage.key(i);
    if(!key||key===STORAGE_KEY||key===SYNC_URL_KEY||key===SYNC_TIME_KEY)continue;
    if(/travel|booking|trip/i.test(key)){
      try{
        const raw=localStorage.getItem(key);if(!raw)continue;
        const parsed=JSON.parse(raw);
        if(parsed&&typeof parsed==='object'){
          if(Array.isArray(parsed.trips)){migratedTrips=migratedTrips.concat(parsed.trips);foundKey=key}
          if(Array.isArray(parsed.bookings)){migratedBookings=migratedBookings.concat(parsed.bookings);foundKey=key}
          if(Array.isArray(parsed)&&parsed.length>0&&(parsed[0].hotelName||parsed[0].checkIn)){
            parsed.forEach(b=>{migratedBookings.push({id:b.id||uid(),tripId:null,type:'hotel',name:b.hotelName||b.name||'不明',site:b.site||'その他',startDate:b.checkIn||b.startDate||'',endDate:b.checkOut||b.endDate||'',confirmNumber:b.confirmationNumber||b.confirmNumber||'',price:b.price||'',notes:b.notes||'',createdAt:b.createdAt||Date.now()})});
            foundKey=key;
          }
        }
      }catch(e){}
    }
  }
  if(!foundKey)return false;
  const tripMap=new Map();migratedTrips.forEach(t=>{if(!t.id)t.id=uid();tripMap.set(t.id,normalizeTrip(t))});
  const bookingMap=new Map();migratedBookings.forEach(b=>{if(!b.id)b.id=uid();bookingMap.set(b.id,normalizeBooking(b))});
  const orphans=Array.from(bookingMap.values()).filter(b=>!b.tripId||!tripMap.has(b.tripId));
  if(orphans.length>0){
    const orphanTripId=uid();
    tripMap.set(orphanTripId,{id:orphanTripId,name:'📥 取り込みデータ',destination:'',startDate:orphans.map(o=>o.startDate).filter(Boolean).sort()[0]||todayStr(),endDate:orphans.map(o=>o.endDate||o.startDate).filter(Boolean).sort().slice(-1)[0]||todayStr(),notes:'旧バージョンから移行された予約です。',createdAt:Date.now()});
    orphans.forEach(b=>{b.tripId=orphanTripId});
  }
  state.trips=Array.from(tripMap.values());
  state.bookings=Array.from(bookingMap.values());
  state.meta.updatedAt=Date.now();
  save();
  return {tripsCount:state.trips.length,bookingsCount:state.bookings.length,sourceKey:foundKey};
}
function normalizeTrip(t){return{id:t.id||uid(),name:t.name||t.title||'無題の旅行',destination:t.destination||t.dest||t.location||'',startDate:t.startDate||t.start||'',endDate:t.endDate||t.end||'',notes:t.notes||'',createdAt:t.createdAt||Date.now()}}
function normalizeBooking(b){return{id:b.id||uid(),tripId:b.tripId||null,type:b.type||'hotel',name:b.name||b.hotelName||b.title||'無題',site:b.site||'その他',startDate:b.startDate||b.checkIn||b.checkin||'',endDate:b.endDate||b.checkOut||b.checkout||'',confirmNumber:b.confirmNumber||b.confirmationNumber||'',price:b.price||'',notes:b.notes||'',createdAt:b.createdAt||Date.now()}}

function load(){try{const raw=localStorage.getItem(STORAGE_KEY);if(raw)state=JSON.parse(raw);if(!state.trips)state.trips=[];if(!state.bookings)state.bookings=[];if(!state.meta)state.meta={updatedAt:0}}catch(e){console.error(e)}}
function save(){state.meta=state.meta||{};state.meta.updatedAt=Date.now();localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function todayStr(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function fmtDate(s){if(!s)return'';const d=new Date(s);if(isNaN(d))return s;return `${d.getMonth()+1}/${d.getDate()}`}
function fmtDateLong(s){if(!s)return'';const d=new Date(s);if(isNaN(d))return s;return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`}
function tripEndDate(trip){let end=trip.endDate||trip.startDate;state.bookings.filter(b=>b.tripId===trip.id).forEach(b=>{const e=b.endDate||b.startDate;if(e&&(!end||e>end))end=e});return end}
function isPastTrip(trip){const end=tripEndDate(trip);if(!end)return false;return end<todayStr()}
function bookingIcon(type){return{hotel:'🏨',flight:'✈️',train:'🚄',car:'🚗',other:'📌'}[type]||'📌'}
function bookingTypeLabel(type){return{hotel:'ホテル',flight:'飛行機',train:'電車',car:'レンタカー',other:'その他'}[type]||'その他'}

function render(){
  const past=state.trips.filter(isPastTrip);
  const pastBtn=document.getElementById('pastBtn');
  if(viewingPast){pastBtn.innerHTML='← 戻る'}
  else{pastBtn.innerHTML=`📚 過去 <span class="badge"${past.length===0?' style="display:none"':''}>${past.length}</span>`}
  const ind=document.getElementById('syncIndicator');
  ind.classList.remove('active','syncing');
  if(syncing)ind.classList.add('syncing');
  else if(localStorage.getItem(SYNC_URL_KEY))ind.classList.add('active');
  document.getElementById('mainTabs').style.display=viewingPast?'none':'flex';
  document.getElementById('addFab').style.display=viewingPast?'none':'flex';
  const content=document.getElementById('content');
  if(viewingPast)renderPast(content,past);
  else if(currentTab==='trips')renderTrips(content);
  else if(currentTab==='bookings')renderBookings(content);
  else if(currentTab==='timeline')renderTimeline(content);
}

function renderTrips(content){
  const active=state.trips.filter(t=>!isPastTrip(t)).sort((a,b)=>(a.startDate||'').localeCompare(b.startDate||''));
  if(active.length===0){content.innerHTML=`<div class="empty"><div class="icon">🧳</div><div class="title">まだ旅行がありません</div><div class="desc">右下の「＋」ボタンで追加できます</div></div>`;return}
  content.innerHTML=active.map(t=>{
    const bookings=state.bookings.filter(b=>b.tripId===t.id);
    const types=[...new Set(bookings.map(b=>b.type))];
    return `<div class="trip-card" data-trip-id="${t.id}"><div class="trip-title">${escapeHtml(t.name)}</div><div class="trip-meta">${t.destination?`<span class="item">📍 ${escapeHtml(t.destination)}</span>`:''}<span class="item">📅 ${fmtDate(t.startDate)} 〜 ${fmtDate(t.endDate)}</span><span class="item">📋 ${bookings.length}件の予約</span></div>${types.length?`<div class="trip-badges">${types.map(ty=>`<span class="badge-pill">${bookingIcon(ty)} ${bookingTypeLabel(ty)}</span>`).join('')}</div>`:''}</div>`;
  }).join('');
  content.querySelectorAll('.trip-card').forEach(el=>el.addEventListener('click',()=>showTripDetail(el.dataset.tripId)));
}

function renderPast(content,past){
  const sorted=past.sort((a,b)=>(b.startDate||'').localeCompare(a.startDate||''));
  content.innerHTML=`<div class="past-header"><div class="label">過去の旅行</div><div class="count">${past.length}<span style="font-size:12px;color:var(--ink-mute);margin-left:4px">件</span></div></div>`+(sorted.length===0?`<div class="empty"><div class="icon">📚</div><div class="title">過去の旅行はまだありません</div><div class="desc">終了した旅行が自動でここに保存されます</div></div>`:sorted.map(t=>{const bookings=state.bookings.filter(b=>b.tripId===t.id);return `<div class="trip-card past" data-trip-id="${t.id}"><div class="trip-title">${escapeHtml(t.name)}</div><div class="trip-meta">${t.destination?`<span class="item">📍 ${escapeHtml(t.destination)}</span>`:''}<span class="item">📅 ${fmtDateLong(t.startDate)} 〜 ${fmtDateLong(t.endDate)}</span><span class="item">📋 ${bookings.length}件の予約</span></div></div>`}).join(''));
  content.querySelectorAll('.trip-card').forEach(el=>el.addEventListener('click',()=>showTripDetail(el.dataset.tripId)));
}

function renderBookings(content){
  const activeTripIds=state.trips.filter(t=>!isPastTrip(t)).map(t=>t.id);
  const bookings=state.bookings.filter(b=>activeTripIds.includes(b.tripId)).sort((a,b)=>(a.startDate||'').localeCompare(b.startDate||''));
  if(bookings.length===0){content.innerHTML=`<div class="empty"><div class="icon">📋</div><div class="title">予約がありません</div></div>`;return}
  content.innerHTML=bookings.map(b=>{const trip=state.trips.find(t=>t.id===b.tripId);return `<div class="booking-item" data-trip-id="${b.tripId}"><div class="booking-icon">${bookingIcon(b.type)}</div><div class="booking-content"><div class="booking-title">${escapeHtml(b.name)}</div><div class="booking-meta">${fmtDate(b.startDate)}${b.endDate?` 〜 ${fmtDate(b.endDate)}`:''}${trip?` ・ ${escapeHtml(trip.name)}`:''}</div><span class="booking-site">${escapeHtml(b.site||'')}</span></div></div>`}).join('');
  content.querySelectorAll('.booking-item').forEach(el=>el.addEventListener('click',()=>showTripDetail(el.dataset.tripId)));
}

function renderTimeline(content){
  const activeTripIds=state.trips.filter(t=>!isPastTrip(t)).map(t=>t.id);
  const items=state.bookings.filter(b=>activeTripIds.includes(b.tripId)).sort((a,b)=>(a.startDate||'').localeCompare(b.startDate||''));
  if(items.length===0){content.innerHTML=`<div class="empty"><div class="icon">🗓</div><div class="title">表示するものがありません</div></div>`;return}
  const byMonth={};items.forEach(b=>{const d=b.startDate||'';const key=d.slice(0,7);if(!byMonth[key])byMonth[key]=[];byMonth[key].push(b)});
  content.innerHTML=Object.keys(byMonth).sort().map(month=>{const [y,m]=month.split('-');return `<div class="section-title">${y}年${parseInt(m)}月</div>${byMonth[month].map(b=>{const trip=state.trips.find(t=>t.id===b.tripId);return `<div class="booking-item" data-trip-id="${b.tripId}"><div class="booking-icon">${bookingIcon(b.type)}</div><div class="booking-content"><div class="booking-title">${escapeHtml(b.name)}</div><div class="booking-meta">${fmtDate(b.startDate)}${b.endDate?` 〜 ${fmtDate(b.endDate)}`:''}${trip?` ・ ${escapeHtml(trip.name)}`:''}</div></div></div>`}).join('')}`}).join('');
  content.querySelectorAll('.booking-item').forEach(el=>el.addEventListener('click',()=>showTripDetail(el.dataset.tripId)));
}

function showTripDetail(tripId){
  const trip=state.trips.find(t=>t.id===tripId);if(!trip)return;
  currentDetailTripId=tripId;
  const bookings=state.bookings.filter(b=>b.tripId===tripId).sort((a,b)=>(a.startDate||'').localeCompare(b.startDate||''));
  document.getElementById('detailTitle').textContent=trip.name;
  const isPast=isPastTrip(trip);
  document.getElementById('detailBody').innerHTML=`<div style="margin-bottom:16px;font-size:13px;color:var(--ink-soft)">${trip.destination?`📍 ${escapeHtml(trip.destination)}<br>`:''}📅 ${fmtDateLong(trip.startDate)} 〜 ${fmtDateLong(trip.endDate)}${isPast?'<br><span style="color:var(--past);font-weight:600">📚 過去の旅行</span>':''}${trip.notes?`<br><br>${escapeHtml(trip.notes)}`:''}</div><div class="btn-row" style="margin-bottom:16px"><button class="btn btn-secondary" id="editTripBtn">旅行を編集</button><button class="btn btn-primary" id="addBookingBtn">＋ 予約追加</button></div><div class="section-title">予約一覧 (${bookings.length})</div>${bookings.length===0?`<div style="text-align:center;color:var(--ink-mute);padding:20px;font-size:13px">予約がまだありません</div>`:bookings.map(b=>`<div class="booking-item" data-booking-id="${b.id}"><div class="booking-icon">${bookingIcon(b.type)}</div><div class="booking-content"><div class="booking-title">${escapeHtml(b.name)}</div><div class="booking-meta">${fmtDate(b.startDate)}${b.endDate?` 〜 ${fmtDate(b.endDate)}`:''}${b.confirmNumber?`<br>予約番号: ${escapeHtml(b.confirmNumber)}`:''}${b.price?`<br>金額: ${escapeHtml(b.price)}`:''}${b.notes?`<br>${escapeHtml(b.notes)}`:''}</div><span class="booking-site">${escapeHtml(b.site||'')}</span></div></div>`).join('')}`;
  document.getElementById('editTripBtn').addEventListener('click',()=>openTripModal(trip));
  document.getElementById('addBookingBtn').addEventListener('click',()=>openBookingModal(null,tripId));
  document.querySelectorAll('#detailBody .booking-item').forEach(el=>el.addEventListener('click',()=>{const b=state.bookings.find(bk=>bk.id===el.dataset.bookingId);if(b)openBookingModal(b,tripId)}));
  openModal('detailModal');
}

function openModal(id){document.getElementById(id).classList.add('active')}
function closeModal(id){document.getElementById(id).classList.remove('active')}
function openTripModal(trip=null){
  closeModal('detailModal');
  document.getElementById('tripModalTitle').textContent=trip?'旅行を編集':'新しい旅行';
  document.getElementById('tripId').value=trip?trip.id:'';
  document.getElementById('tripName').value=trip?trip.name:'';
  document.getElementById('tripDest').value=trip?(trip.destination||''):'';
  document.getElementById('tripStart').value=trip?trip.startDate:'';
  document.getElementById('tripEnd').value=trip?trip.endDate:'';
  document.getElementById('tripNotes').value=trip?(trip.notes||''):'';
  document.getElementById('tripEditActions').style.display=trip?'flex':'none';
  openModal('tripModal');
}
function openBookingModal(booking=null,tripId=null){
  closeModal('detailModal');
  document.getElementById('bookingModalTitle').textContent=booking?'予約を編集':'予約を追加';
  document.getElementById('bookingId').value=booking?booking.id:'';
  document.getElementById('bookingTripId').value=booking?booking.tripId:tripId;
  document.getElementById('bookingType').value=booking?booking.type:'hotel';
  document.getElementById('bookingName').value=booking?booking.name:'';
  document.getElementById('bookingSite').value=booking?(booking.site||'一休'):'一休';
  document.getElementById('bookingStart').value=booking?booking.startDate:'';
  document.getElementById('bookingEnd').value=booking?(booking.endDate||''):'';
  document.getElementById('bookingConfirm').value=booking?(booking.confirmNumber||''):'';
  document.getElementById('bookingPrice').value=booking?(booking.price||''):'';
  document.getElementById('bookingNotes').value=booking?(booking.notes||''):'';
  document.getElementById('bookingEditActions').style.display=booking?'flex':'none';
  openModal('bookingModal');
}

async function cloudPush(){
  const url=localStorage.getItem(SYNC_URL_KEY);if(!url)return null;
  syncing=true;render();
  try{
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'sync_v3',clientData:state,clientUpdatedAt:state.meta.updatedAt})});
    const data=await res.json();syncing=false;
    if(data.success){
      if(data.serverData&&data.serverData.meta&&data.serverData.meta.updatedAt>state.meta.updatedAt){state=data.serverData;save()}
      localStorage.setItem(SYNC_TIME_KEY,Date.now().toString());render();return data;
    }
    render();return null;
  }catch(e){syncing=false;render();console.error('Sync error:',e);return null}
}
async function cloudPull(){
  const url=localStorage.getItem(SYNC_URL_KEY);if(!url)return null;
  syncing=true;render();
  try{
    const res=await fetch(url+'?action=pull',{method:'GET'});
    const data=await res.json();syncing=false;
    if(data.success&&data.serverData){
      if(data.serverData.meta&&data.serverData.meta.updatedAt>state.meta.updatedAt){state=data.serverData;save();render();toast('クラウドから取得しました')}
      return data;
    }
    render();
  }catch(e){syncing=false;render();return null}
}
async function testConnection(url){try{const res=await fetch(url+'?action=ping',{method:'GET'});const data=await res.json();return data.success}catch(e){return false}}
function updateSyncStatusBox(){
  const url=localStorage.getItem(SYNC_URL_KEY);
  const time=localStorage.getItem(SYNC_TIME_KEY);
  const box=document.getElementById('syncStatusBox');
  if(url){box.classList.add('connected');const timeStr=time?new Date(parseInt(time)).toLocaleString('ja-JP'):'未同期';box.innerHTML=`✅ 連携中<br>最終同期: ${timeStr}`;document.getElementById('syncUrl').value=url}
  else{box.classList.remove('connected');box.textContent='未接続です'}
}

document.querySelectorAll('.tab').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');currentTab=t.dataset.tab;render()})});
document.getElementById('pastBtn').addEventListener('click',()=>{viewingPast=!viewingPast;render()});
document.getElementById('syncBtn').addEventListener('click',()=>{updateSyncStatusBox();openModal('syncModal')});
document.getElementById('addFab').addEventListener('click',()=>openTripModal());
document.querySelectorAll('[data-close]').forEach(el=>el.addEventListener('click',()=>el.closest('.modal-overlay').classList.remove('active')));
document.querySelectorAll('.modal-overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('active')}));

document.getElementById('tripForm').addEventListener('submit',e=>{
  e.preventDefault();
  const id=document.getElementById('tripId').value;
  const data={id:id||uid(),name:document.getElementById('tripName').value,destination:document.getElementById('tripDest').value,startDate:document.getElementById('tripStart').value,endDate:document.getElementById('tripEnd').value,notes:document.getElementById('tripNotes').value,createdAt:id?undefined:Date.now()};
  if(id){const idx=state.trips.findIndex(t=>t.id===id);if(idx>=0)state.trips[idx]={...state.trips[idx],...data}}
  else{state.trips.push(data)}
  save();closeModal('tripModal');render();toast(id?'旅行を更新しました':'旅行を追加しました');cloudPush();
});
document.getElementById('tripDeleteBtn').addEventListener('click',()=>{
  const id=document.getElementById('tripId').value;if(!id)return;
  if(!confirm('この旅行と関連する予約をすべて削除しますか？'))return;
  state.trips=state.trips.filter(t=>t.id!==id);
  state.bookings=state.bookings.filter(b=>b.tripId!==id);
  save();closeModal('tripModal');render();toast('削除しました');cloudPush();
});
document.getElementById('bookingForm').addEventListener('submit',e=>{
  e.preventDefault();
  const id=document.getElementById('bookingId').value;
  const tripId=document.getElementById('bookingTripId').value;
  const data={id:id||uid(),tripId,type:document.getElementById('bookingType').value,name:document.getElementById('bookingName').value,site:document.getElementById('bookingSite').value,startDate:document.getElementById('bookingStart').value,endDate:document.getElementById('bookingEnd').value,confirmNumber:document.getElementById('bookingConfirm').value,price:document.getElementById('bookingPrice').value,notes:document.getElementById('bookingNotes').value,createdAt:id?undefined:Date.now()};
  if(id){const idx=state.bookings.findIndex(b=>b.id===id);if(idx>=0)state.bookings[idx]={...state.bookings[idx],...data}}
  else{state.bookings.push(data)}
  save();closeModal('bookingModal');render();
  if(currentDetailTripId)showTripDetail(currentDetailTripId);
  toast(id?'予約を更新しました':'予約を追加しました');cloudPush();
});
document.getElementById('bookingDeleteBtn').addEventListener('click',()=>{
  const id=document.getElementById('bookingId').value;if(!id)return;
  if(!confirm('この予約を削除しますか？'))return;
  state.bookings=state.bookings.filter(b=>b.id!==id);
  save();closeModal('bookingModal');render();
  if(currentDetailTripId)showTripDetail(currentDetailTripId);
  toast('削除しました');cloudPush();
});
document.getElementById('testSyncBtn').addEventListener('click',async()=>{
  const url=document.getElementById('syncUrl').value.trim();
  if(!url)return toast('URLを入力してください');
  toast('接続をテスト中...');
  const ok=await testConnection(url);
  toast(ok?'✅ 接続成功':'❌ 接続失敗');
});
document.getElementById('saveSyncBtn').addEventListener('click',async()=>{
  const url=document.getElementById('syncUrl').value.trim();
  if(!url)return toast('URLを入力してください');
  localStorage.setItem(SYNC_URL_KEY,url);toast('保存しました');updateSyncStatusBox();
  await cloudPush();closeModal('syncModal');
});
document.getElementById('syncNowBtn').addEventListener('click',async()=>{
  await cloudPush();await cloudPull();updateSyncStatusBox();toast('同期完了');
});
document.getElementById('disconnectSyncBtn').addEventListener('click',()=>{
  if(!confirm('連携を解除しますか？'))return;
  localStorage.removeItem(SYNC_URL_KEY);localStorage.removeItem(SYNC_TIME_KEY);
  updateSyncStatusBox();render();toast('解除しました');
});

function toast(msg){const t=document.getElementById('toast');t.innerHTML=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400)}
function escapeHtml(s){if(s==null)return'';return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

load();
const migrationResult=migrateOldData();
if(migrationResult){setTimeout(()=>{toast(`✨ ${migrationResult.tripsCount}件の旅行・${migrationResult.bookingsCount}件の予約を移行しました`)},500)}
render();
if(localStorage.getItem(SYNC_URL_KEY))setTimeout(cloudPull,800);
setInterval(render,60000);
setInterval(()=>{if(localStorage.getItem(SYNC_URL_KEY)&&!syncing)cloudPush()},5*60*1000);
</script>
